<div class="admin-shell">
  <app-sidebar [(open)]="sidebarOpen" [nav]="nav" (navigate)="onNavigate($event)"></app-sidebar>

  <div class="content">
    <header class="topbar">
      <button class="btn btn-light me-2 text-DARK" (click)="sidebarOpen = !sidebarOpen">
        <i class="bi bi-list"></i>
      </button>
      <div class="ms-auto d-flex align-items-center gap-2">
        <button class="icon-btn"><i class="bi bi-ui-radios-grid"></i></button>
        <button class="icon-btn"><i class="bi bi-search"></i></button>
        <button class="icon-btn"><i class="bi bi-bell"></i></button>
        <div class="dropdown profile-dropdown" [class.show]="profileMenuOpen">
          <button
            class="border-0 p-0 icon-btn"
            type="button"
            (click)="toggleProfileMenu()"
            [attr.aria-expanded]="profileMenuOpen"
            aria-haspopup="true"
          >
            <span class="avatar">{{ userInitials }}</span>
          </button>
          <div class="dropdown-menu dropdown-menu-end" [class.show]="profileMenuOpen">
            <button class="dropdown-item" type="button" (click)="goToProfile()">
              <i class="bi bi-person-circle me-2"></i> Perfil
            </button>
            <button class="dropdown-item text-danger" type="button" (click)="logout()">
              <i class="bi bi-box-arrow-right me-2"></i> Salir
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="page">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
