<div class="login-mobile-container">
  <div class="login-mobile-content">
    <div class="header-section">
      <div class="logo-circle">
        <i class="bi bi-truck truck-icon" aria-hidden="true"></i>
      </div>

      <h1 class="title">Sistema de Operador</h1>
      <p class="subtitle">Inicia sesión para ver tus rutas</p>
    </div>

    <div class="form-card">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="alert-error" *ngIf="errorMessage">
          <i class="bi bi-exclamation-circle-fill alert-icon" aria-hidden="true"></i>
          <span>{{ errorMessage }}</span>
        </div>

        <div class="form-group">
          <div class="input-wrapper">
            <i class="bi bi-person input-icon" aria-hidden="true"></i>
            <input
              type="text"
              class="form-input"
              formControlName="usuario"
              placeholder="Usuario / Alias"
              autocomplete="username"
              [class.is-invalid]="form.controls.usuario.touched && form.controls.usuario.invalid"
            />
          </div>

          <div class="error-message" *ngIf="form.controls.usuario.touched && form.controls.usuario.invalid">
            Ingresa tu usuario
          </div>
        </div>

        <div class="form-group">
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon" aria-hidden="true"></i>

            <input
              [type]="showPassword ? 'text' : 'password'"
              class="form-input"
              formControlName="password"
              placeholder="Contraseña"
              autocomplete="current-password"
              [class.is-invalid]="form.controls.password.touched && form.controls.password.invalid"
            />

            <button
              type="button"
              class="toggle-password"
              (click)="togglePasswordVisibility()"
              aria-label="Mostrar/ocultar contraseña"
            >
              <i
                class="bi"
                [class.bi-eye]="!showPassword"
                [class.bi-eye-slash]="showPassword"
                aria-hidden="true"
              ></i>
            </button>
          </div>

          <div
            class="error-message"
            *ngIf="form.controls.password.touched && form.controls.password.invalid"
          >
            Ingresa tu contraseña
          </div>
        </div>

        <button type="submit" class="btn-login" [disabled]="loading || form.invalid">
          <span *ngIf="!loading">Iniciar Sesión</span>
          <span *ngIf="loading" class="loading-text">
            <span class="spinner"></span>
            Validando...
          </span>
        </button>

      </form>
    </div>
  </div>
</div>
